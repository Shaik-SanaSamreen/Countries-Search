<!DOCTYPE html>

<!DOCTYPE html><!--SANA SAMREEN-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countries Search Tool</title>
    <!-- Bootstrap CSS for responsive design and basic styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS for additional styling -->
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts - Inter for a clean look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-light font-inter">
    <div class="container py-5">
        <h1 class="text-center mb-4 text-primary fw-bold">Countries Search Tool</h1>
        <p class="text-center text-muted mb-5">Explore the world's countries and their populations.</p>

        <!-- Search Bar -->
        <div class="input-group mb-5 shadow-sm rounded-pill overflow-hidden border">
            <span class="input-group-text bg-white border-0 ps-4 pe-2" id="search-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-search text-muted" viewBox="0 0 16 16">
                    <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.085.12l3.95 3.95a1 1 0 0 0 1.414-1.414zm-5.934 0a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11"/>
                </svg>
            </span>
            <input type="text" class="form-control border-0 py-2 ps-2 pe-4" placeholder="Search for a country..." id="searchInput" aria-label="Search countries">
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="d-flex justify-content-center align-items-center" style="min-height: 200px;">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>

        <!-- Countries Container -->
        <div id="countriesContainer" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4">
            <!-- Country cards will be inserted here by JavaScript -->
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="alert alert-danger d-none text-center" role="alert">
            Failed to load countries. Please try again later.
        </div>
    </div>

    <!-- Bootstrap JS (Popper.js and Bootstrap JS bundle) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JavaScript -->
    <script src="script.js"></script>
</body>
</html>
